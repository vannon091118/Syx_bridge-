name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        working-directory: core
        run: npm ci

      - name: Lint (informational)
        working-directory: core
        run: npm run lint:check
        continue-on-error: true

      - name: Syntax check
        working-directory: core
        run: npm run test:syntax

      - name: Consistency check
        working-directory: core
        run: npm run consistency

      - name: Plugin boundary contract
        working-directory: core
        run: npm run test:plugin-boundary

      - name: Jest unit tests
        working-directory: core
        run: npm run test:jest
